<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register - SafaiMitra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />

  <!-- External CSS -->
  <link th:href="@{/css/style.css}" rel="stylesheet">

  <style>
    /* Toast Styles */
    .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 350px;
        max-width: 450px;
    }
    .toast-custom {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px 25px;
        box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        border-left: 6px solid #28a745;
        animation: slideInRight 0.5s ease-out;
        margin-bottom: 15px;
        display: flex;
        align-items: flex-start;
        gap: 15px;
    }
    .toast-custom.error {
        border-left-color: #dc3545;
    }
    .toast-custom .toast-icon {
        font-size: 2rem;
        flex-shrink: 0;
        margin-top: 2px;
    }
    .toast-custom .toast-icon.success {
        color: #28a745;
    }
    .toast-custom .toast-icon.error {
        color: #dc3545;
    }
    .toast-custom .toast-content {
        flex: 1;
    }
    .toast-custom .toast-title {
        font-weight: 700;
        font-size: 1.05rem;
        color: #1a1a2e;
        margin-bottom: 2px;
    }
    .toast-custom .toast-message {
        color: #555555;
        font-size: 0.9rem;
    }
    .toast-custom .toast-close {
        background: none;
        border: none;
        font-size: 1.3rem;
        color: #999;
        cursor: pointer;
        padding: 0 5px;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }
    .toast-custom .toast-close:hover {
        color: #333;
        transform: rotate(90deg);
    }

    @keyframes slideInRight {
        0% { opacity: 0; transform: translateX(100px); }
        100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOutRight {
        0% { opacity: 1; transform: translateX(0); }
        100% { opacity: 0; transform: translateX(100px); }
    }
    .toast-custom.hiding {
        animation: slideOutRight 0.4s ease-in forwards;
    }

    /* Register Card */
    .register-card h2 {
        color: #28a745;
        font-weight: 700;
    }
    .register-card h5 {
        color: #888888;
    }
    .register-card .form-label {
        font-weight: 600;
        color: #444444;
        font-size: 0.9rem;
    }
    .register-card .btn-success {
        background: #28a745;
        border: none;
        padding: 14px;
        font-weight: 700;
        font-size: 1.05rem;
        border-radius: 12px;
        transition: all 0.3s ease;
    }
    .register-card .btn-success:hover {
        background: #218838;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(40,167,69,0.3);
    }
    .register-card a {
        color: #28a745;
        text-decoration: none;
        font-weight: 600;
    }
    .register-card a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>

<!-- ============================================================ -->
<!-- NAVBAR -->
<!-- ============================================================ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ============================================================ -->
<!-- TOAST / POPUP CONTAINER -->
<!-- ============================================================ -->
<div class="toast-container" id="toastContainer">
  <!-- Success Toast -->
  <div th:if="${success}" class="toast-custom" id="successToast">
    <div class="toast-icon success">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="toast-content">
      <div class="toast-title">✅ Registration Successful!</div>
      <div class="toast-message" th:text="${success}">Please login to continue.</div>
    </div>
    <button class="toast-close" onclick="closeToast(this)">&times;</button>
  </div>

  <!-- Error Toast -->
  <div th:if="${error}" class="toast-custom error" id="errorToast">
    <div class="toast-icon error">
      <i class="fas fa-exclamation-circle"></i>
    </div>
    <div class="toast-content">
      <div class="toast-title">❌ Registration Failed</div>
      <div class="toast-message" th:text="${error}">Please try again.</div>
    </div>
    <button class="toast-close" onclick="closeToast(this)">&times;</button>
  </div>
</div>

<!-- ============================================================ -->
<!-- REGISTER FORM -->
<!-- ============================================================ -->
<div class="card-wrapper">
  <div class="register-card form-card shadow" data-aos="fade-up" data-aos-duration="800">
    <h2 class="text-center"><i class="fas fa-recycle"></i> SafaiMitra</h2>
    <h5 class="text-center">Create New Account</h5>
    <hr>

    <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">

      <div class="mb-3">
        <label class="form-label"><i class="fas fa-user me-1"></i> Full Name</label>
        <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter your full name" required>
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="fas fa-envelope me-1"></i> Email Address</label>
        <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="fas fa-phone me-1"></i> Phone Number</label>
        <input type="tel" class="form-control" th:field="*{phone}" placeholder="Enter phone number">
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
        <input type="password" class="form-control" th:field="*{password}" placeholder="Create a strong password" required>
      </div>

      <button type="submit" class="btn btn-success w-100 py-2" id="submitBtn">
        <i class="fas fa-user-plus"></i> Register
      </button>
    </form>

    <p class="text-center mt-3">
      Already have an account? <a href="/login">Login here</a>
    </p>
  </div>
</div>

<!-- ============================================================ -->
<!-- SCRIPTS -->
<!-- ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script>
  // ===== AOS INIT =====
  AOS.init({ duration: 1000 });

  // ===== CLOSE TOAST =====
  function closeToast(button) {
      const toast = button.closest('.toast-custom');
      if (toast) {
          toast.classList.add('hiding');
          setTimeout(() => {
              if (toast.parentNode) {
                  toast.remove();
              }
          }, 400);
      }
  }

  // ===== AUTO CLOSE TOAST AFTER 5 SECONDS =====
  document.addEventListener('DOMContentLoaded', function() {
      const toasts = document.querySelectorAll('.toast-custom');
      toasts.forEach(toast => {
          setTimeout(() => {
              if (toast.parentNode) {
                  toast.classList.add('hiding');
                  setTimeout(() => {
                      if (toast.parentNode) {
                          toast.remove();
                      }
                  }, 400);
              }
          }, 5000);
      });
  });

  // ===== FORM SUBMIT - Disable Button =====
  document.getElementById('registerForm')?.addEventListener('submit', function() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
  });
</script>

</body>
</html>
