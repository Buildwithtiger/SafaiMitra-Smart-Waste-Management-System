<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - SafaiMitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />

    <!-- External CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        .profile-pic-wrapper {
            position: relative;
            display: inline-block;
        }
        .profile-pic-wrapper .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #28a745;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .profile-pic-wrapper .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #28a745;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .profile-pic-wrapper .upload-btn:hover {
            background: #218838;
            transform: scale(1.1);
        }
        .profile-pic-wrapper .upload-btn input {
            display: none;
        }
        .readonly-field {
            background: #f0f0f0 !important;
            color: #666 !important;
            cursor: not-allowed;
        }
        .form-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            border: 1px solid #e8e8e8;
        }
        .form-section .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #888;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .form-section .section-title i {
            color: #28a745;
            margin-right: 8px;
        }

        /* Toast Popup */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 320px;
            max-width: 400px;
        }
        .toast-custom {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            border-left: 4px solid #28a745;
            animation: slideInRight 0.4s ease-out;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .toast-custom.error { border-left-color: #dc3545; }
        .toast-custom .toast-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 1px; }
        .toast-custom .toast-icon.success { color: #28a745; }
        .toast-custom .toast-icon.error { color: #dc3545; }
        .toast-custom .toast-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a1a2e;
            margin-bottom: 1px;
        }
        .toast-custom .toast-message { color: #555; font-size: 0.85rem; }
        .toast-custom .toast-close {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #999;
            cursor: pointer;
            padding: 0 3px;
        }
        .toast-custom .toast-close:hover { color: #333; }

        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(80px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutRight {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(80px); }
        }
        .toast-custom.hiding { animation: slideOutRight 0.3s ease-in forwards; }
    </style>
</head>
<body>

<!-- ============================================================ -->
<!-- NAVBAR -->
<!-- ============================================================ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ============================================================ -->
<!-- TOAST POPUP -->
<!-- ============================================================ -->
<div class="toast-container" id="toastContainer">
    <div th:if="${success}" class="toast-custom" id="successToast">
        <div class="toast-icon success"><i class="fas fa-check-circle"></i></div>
        <div class="toast-content">
            <div class="toast-title">✅ Success!</div>
            <div class="toast-message" th:text="${success}">Profile updated successfully!</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>

    <div th:if="${error}" class="toast-custom error" id="errorToast">
        <div class="toast-icon error"><i class="fas fa-exclamation-circle"></i></div>
        <div class="toast-content">
            <div class="toast-title">❌ Oops!</div>
            <div class="toast-message" th:text="${error}">Something went wrong!</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>
</div>

<!-- ============================================================ -->
<!-- PROFILE FORM -->
<!-- ============================================================ -->
<div class="card-wrapper">
    <div class="form-card shadow" data-aos="fade-up" data-aos-duration="800">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <h3 class="text-success"><i class="fas fa-user-edit"></i> My Profile</h3>
            <span class="badge badge-pending">Edit Mode</span>
        </div>
        <p class="text-muted">Update your personal information</p>
        <hr>

        <!-- Profile Form -->
        <form th:action="@{/profile}" method="post" enctype="multipart/form-data" id="profileForm">

            <!-- ===== Profile Picture ===== -->
            <div class="text-center mb-3">
                <div class="profile-pic-wrapper">
                    <img th:src="${user.profilePic != null ? user.profilePic : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=28a745&color=fff&size=130'}"
                         alt="Profile"
                         class="profile-pic"
                         id="profilePreview">
                    <label class="upload-btn">
                        <i class="fas fa-camera"></i>
                        <input type="file" name="profilePic" accept="image/*" onchange="previewImage(event)">
                    </label>
                </div>
                <p class="text-muted small mt-2">Click on camera icon to change photo</p>
            </div>

            <!-- ===== Personal Information ===== -->
            <div class="form-section">
                <div class="section-title"><i class="fas fa-user"></i> Personal Information</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">Full Name <span class="required">*</span></label>
                            <input type="text" class="form-control" th:value="${user.fullName}" name="fullName" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control readonly-field" th:value="${user.email}" readonly>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" th:value="${user.phone}" name="phone" placeholder="Enter your phone number">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">Gender</label>
                            <select class="form-select" name="gender">
                                <option th:selected="${user.gender == null}" value="">Select Gender</option>
                                <option th:selected="${user.gender == 'Male'}" value="Male">👨 Male</option>
                                <option th:selected="${user.gender == 'Female'}" value="Female">👩 Female</option>
                                <option th:selected="${user.gender == 'Other'}" value="Other">👤 Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" th:value="${user.address}" name="address" placeholder="Enter your address">
                </div>
            </div>

            <!-- ===== Change Password ===== -->
            <div class="form-section">
                <div class="section-title"><i class="fas fa-lock"></i> Change Password</div>
                <p class="text-muted small">Leave blank if you don't want to change password</p>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" name="newPassword" placeholder="Enter new password">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-2">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm new password">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Required Field Note -->
            <p class="text-muted small mb-3"><i class="fas fa-info-circle me-1"></i> Fields with <span class="required">*</span> are required</p>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-success w-100" id="submitBtn">
                <i class="fas fa-save"></i> Update Profile
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="btn btn-secondary btn-sm">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- FOOTER -->
<!-- ============================================================ -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- ============================================================ -->
<!-- SCRIPTS -->
<!-- ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000 });

    // ===== PREVIEW IMAGE =====
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profilePreview').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    // ===== CLOSE TOAST =====
    function closeToast(button) {
        const toast = button.closest('.toast-custom');
        if (toast) {
            toast.classList.add('hiding');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 300);
        }
    }

    // ===== AUTO CLOSE TOAST AFTER 4 SECONDS =====
    document.addEventListener('DOMContentLoaded', function() {
        const toasts = document.querySelectorAll('.toast-custom');
        toasts.forEach(toast => {
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.add('hiding');
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 300);
                }
            }, 4000);
        });
    });

    // ===== FORM SUBMIT - Disable Button to Prevent Double Submit =====
    document.getElementById('profileForm')?.addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
    });
</script>

</body>
</html>
