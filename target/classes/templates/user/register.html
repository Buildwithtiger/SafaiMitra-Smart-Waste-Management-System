<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register - SafaiMitra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
    .register-card { max-width: 500px; margin: 60px auto; background: #1e1e1e; padding: 30px; border-radius: 16px; border: 1px solid #28a745; }
    .form-control { background: #2a2a2a; color: white; border: 1px solid #444; }
    .form-control:focus { border-color: #28a745; box-shadow: none; }
    .btn-success { background: #28a745; border: none; }
    .btn-success:hover { background: #218838; }
    a { color: #28a745; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="register-card shadow">
    <h2 class="text-center text-success"><i class="fas fa-recycle"></i> SafaiMitra</h2>
    <h5 class="text-center text-light mb-4">Create New Account</h5>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form th:action="@{/register}" th:object="${user}" method="post">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter your full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" th:field="*{phone}" placeholder="Enter phone number">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" th:field="*{password}" placeholder="Create a strong password" required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2"><i class="fas fa-user-plus"></i> Register</button>
    </form>
    <p class="text-center mt-3">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
