<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Emergency - SafaiMitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />

    <!-- External CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        .emergency-header {
            background: linear-gradient(135deg, #dc3545, #ff6b6b);
            padding: 30px;
            border-radius: 16px;
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        .emergency-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .emergency-header .sub {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .emergency-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #dc3545;
            background: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(220,53,69,0.2);
        }
        .emergency-type {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 20px;
            border-left: 4px solid #dc3545;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .emergency-type:hover {
            background: #ffffff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transform: translateX(5px);
        }
        .emergency-type input[type="radio"] {
            accent-color: #dc3545;
            width: 18px;
            height: 18px;
            margin-right: 10px;
        }
        .emergency-type label {
            color: #333333;
            font-weight: 500;
            cursor: pointer;
        }
        .emergency-type small {
            color: #888888;
            font-size: 0.75rem;
            display: block;
            margin-left: 30px;
        }
        .free-badge {
            background: #28a745;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 8px;
        }
        .urgent-badge {
            background: #dc3545;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<!-- ============================================================ -->
<!-- NAVBAR -->
<!-- ============================================================ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ============================================================ -->
<!-- TOAST / POPUP CONTAINER -->
<!-- ============================================================ -->
<div class="toast-container" id="toastContainer">
    <!-- Success Toast -->
    <div th:if="${success}" class="toast-custom" id="successToast">
        <div class="toast-icon success">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">🚨 Emergency Submitted!</div>
            <div class="toast-message" th:text="${success}">Our team will respond immediately.</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>

    <!-- Error Toast -->
    <div th:if="${error}" class="toast-custom error" id="errorToast">
        <div class="toast-icon error">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">❌ Oops!</div>
            <div class="toast-message" th:text="${error}">Something went wrong!</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>
</div>

<!-- ============================================================ -->
<!-- EMERGENCY FORM -->
<!-- ============================================================ -->
<div class="card-wrapper">
    <div class="form-card shadow" data-aos="fade-up" data-aos-duration="800">

        <!-- Emergency Header -->
        <div class="emergency-header">
            <h1><i class="fas fa-triangle-exclamation"></i> Emergency</h1>
            <p class="sub">Immediate assistance for urgent waste management and emergency services</p>
            <div class="mt-3">
                <span class="emergency-number">
                    <i class="fas fa-phone"></i> 112
                </span>
                <span style="color: white; font-size: 0.9rem; display: block; margin-top: 5px;">📞 Free Ambulance & Fire Brigade</span>
            </div>
        </div>

        <form th:action="@{/emergency}" method="post" id="emergencyForm">

            <!-- Emergency Type -->
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-exclamation-triangle me-1"></i> Emergency Type <span class="required">*</span></label>
                <div class="row g-2">
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="AMBULANCE" id="ambulance" required>
                            <label for="ambulance">🚑 Free Ambulance</label>
                            <span class="free-badge">FREE</span>

                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="FIRE_BRIGADE" id="fire_brigade">
                            <label for="fire_brigade">🔥 Free Fire Brigade</label>
                            <span class="free-badge">FREE</span>

                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="BIOHAZARD" id="biohazard">
                            <label for="biohazard">🧬 Biohazard Spill</label>
                            <span class="urgent-badge">URGENT</span>

                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="CHEMICAL" id="chemical">
                            <label for="chemical">🧪 Chemical Leak</label>
                            <span class="urgent-badge">URGENT</span>

                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="BLOCKAGE" id="blockage">
                            <label for="blockage">🚽 Severe Blockage</label>

                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="emergency-type">
                            <input type="radio" name="emergencyType" value="OVERFLOW" id="overflow">
                            <label for="overflow">🗑️ Garbage Overflow</label>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-align-left me-1"></i> Description <span class="required">*</span></label>
                <textarea class="form-control" name="description" rows="3" placeholder="Describe the emergency situation in detail..." required></textarea>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-map-marker-alt me-1"></i> Location Address <span class="required">*</span></label>
                <input type="text" class="form-control" name="address" placeholder="Enter exact location" required>
            </div>

            <!-- Contact Number -->
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-phone me-1"></i> Contact Number <span class="required">*</span></label>
                <input type="tel" class="form-control" name="phone" placeholder="Enter your phone number" required>
            </div>

            <!-- Required Field Note -->
            <p class="text-muted small mb-3"><i class="fas fa-info-circle me-1"></i> Fields with <span class="required">*</span> are required</p>

            <!-- Submit Button -->
            <button type="submit" class="btn w-100" id="submitBtn" style="background: #dc3545; color: white; font-weight: 700; padding: 14px; border-radius: 12px; font-size: 1.1rem; transition: all 0.3s ease;">
                <i class="fas fa-paper-plane"></i> Request Emergency Assistance
            </button>
        </form>
    </div>
</div>

<!-- ============================================================ -->
<!-- FOOTER -->
<!-- ============================================================ -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    // ===== AOS INIT =====
    AOS.init({ duration: 1000 });

    // ===== CLOSE TOAST =====
    function closeToast(button) {
        const toast = button.closest('.toast-custom');
        if (toast) {
            toast.classList.add('hiding');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 400);
        }
    }

    // ===== SHOW TOAST AND REDIRECT TO HOME =====
    function showToastAndRedirect(message, type) {
        // Remove existing toasts
        const existingToasts = document.querySelectorAll('.toast-custom');
        existingToasts.forEach(t => t.remove());

        // Create toast container if not exists
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }

        // Create toast
        const toast = document.createElement('div');
        toast.className = 'toast-custom';
        if (type === 'error') {
            toast.classList.add('error');
        }
        toast.innerHTML = `
            <div class="toast-icon ${type === 'error' ? 'error' : 'success'}">
                <i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
            </div>
            <div class="toast-content">
                <div class="toast-title">${type === 'error' ? '❌ Oops!' : '🚨 Emergency Submitted!'}</div>
                <div class="toast-message">${message}</div>
            </div>
            <button class="toast-close" onclick="closeToast(this)">&times;</button>
        `;
        container.appendChild(toast);

        // Auto close after 3 seconds and redirect
        setTimeout(() => {
            toast.classList.add('hiding');
            setTimeout(() => {
                toast.remove();
                // Redirect to home page
                window.location.href = '/';
            }, 400);
        }, 3000);
    }

    // ===== FORM SUBMIT - Show Toast & Redirect =====
    document.getElementById('emergencyForm')?.addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent default form submission

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

        // Get form data
        const formData = new FormData(this);

        // Submit form using fetch
        fetch(this.action, {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            // Check if success message is in response
            if (html.includes('success')) {
                showToastAndRedirect('✅ Emergency request submitted! Our team will respond immediately.', 'success');
            } else {
                showToastAndRedirect('❌ Something went wrong! Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Emergency Assistance';
            }
        })
        .catch(error => {
            showToastAndRedirect('❌ Network error! Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Emergency Assistance';
        });
    });
</script>

</body>
</html>
