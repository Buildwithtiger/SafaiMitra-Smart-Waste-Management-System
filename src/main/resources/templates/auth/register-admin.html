<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Register - SafaiMitra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />

    <!-- External CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        .admin-badge {
            background: #dc3545;
            color: white;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .register-card h2 {
            color: #dc3545;
            font-weight: 700;
        }
        .register-card .btn-danger {
            background: #dc3545;
            border: none;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .register-card .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220,53,69,0.3);
        }
        .register-card a {
            color: #dc3545;
            text-decoration: none;
            font-weight: 600;
        }
        .register-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- ============================================================ -->
<!-- NAVBAR -->
<!-- ============================================================ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ============================================================ -->
<!-- TOAST / POPUP CONTAINER -->
<!-- ============================================================ -->
<div class="toast-container" id="toastContainer">
    <!-- Success Toast -->
    <div th:if="${success}" class="toast-custom" id="successToast">
        <div class="toast-icon success">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">✅ Admin Created!</div>
            <div class="toast-message" th:text="${success}">Please login to continue.</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>

    <!-- Error Toast -->
    <div th:if="${error}" class="toast-custom error" id="errorToast">
        <div class="toast-icon error">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">❌ Registration Failed</div>
            <div class="toast-message" th:text="${error}">Please try again.</div>
        </div>
        <button class="toast-close" onclick="closeToast(this)">&times;</button>
    </div>
</div>

<!-- ============================================================ -->
<!-- ADMIN REGISTER FORM -->
<!-- ============================================================ -->
<div class="card-wrapper">
    <div class="register-card form-card shadow" data-aos="fade-up" data-aos-duration="800">
        <h2 class="text-center">
            <i class="fas fa-user-shield"></i> Admin Registration
            <span class="admin-badge">ADMIN</span>
        </h2>
        <h5 class="text-center text-muted">Create admin account</h5>
        <hr>

        <form th:action="@{/register-admin}" th:object="${user}" method="post" id="registerForm">

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user me-1"></i> Full Name</label>
                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter admin full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-envelope me-1"></i> Email Address</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="Enter admin email" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-phone me-1"></i> Phone Number</label>
                <input type="tel" class="form-control" th:field="*{phone}" placeholder="Enter phone number">
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Create a strong password" required>
            </div>

            <!-- ✅ Hidden Field to Set Role as ADMIN -->
            <input type="hidden" name="role" value="ADMIN">

            <button type="submit" class="btn btn-danger w-100 py-2" id="submitBtn">
                <i class="fas fa-user-shield"></i> Register as Admin
            </button>
        </form>

        <p class="text-center mt-3">
            Already have an admin account? <a href="/login">Login here</a>
        </p>
    </div>
</div>

<!-- ============================================================ -->
<!-- SCRIPTS -->
<!-- ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script>
    AOS.init({ duration: 1000 });

    function closeToast(button) {
        const toast = button.closest('.toast-custom');
        if (toast) {
            toast.classList.add('hiding');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 400);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const toasts = document.querySelectorAll('.toast-custom');
        toasts.forEach(toast => {
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.add('hiding');
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 400);
                }
            }, 5000);
        });
    });

    document.getElementById('registerForm')?.addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Admin...';
    });
</script>

</body>
</html>
